apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: liquibase-users-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/krishnakumar-sudala/db-platform-liquibase.git
    targetRevision: main
    path: apps/liquibase-users/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: liquibase-users-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
