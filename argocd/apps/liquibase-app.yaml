apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: liquibase-migrations
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/krishnakumar-sudala/argocd-gitops-apps.git
    targetRevision: main
    path: liquibase/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: db-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
